name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: draft_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d draft_ai"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pg_isready -h localhost -p 5432 -U postgres -d draft_ai
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/draft_ai
          NEXTAUTH_SECRET: ci-test-secret-min-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci
          GOOGLE_CLIENT_SECRET: ci
          OPENAI_API_KEY: sk-ci
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

  draft-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: draft
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: draft/package-lock.json
      - run: npm ci
      - run: npm run build
